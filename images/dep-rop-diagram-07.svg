<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 520" font-family="'Segoe UI',sans-serif">
  <defs><linearGradient id="bg7" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#1a1a2e"/><stop offset="1" stop-color="#0f0f1e"/></linearGradient></defs>
  <rect width="1000" height="520" fill="url(#bg7)"/>
  <text x="500" y="42" text-anchor="middle" fill="#e94560" font-size="22" font-weight="700">Before / after VirtualAlloc — page permission flip</text>
  <text x="500" y="66" text-anchor="middle" fill="#c9c9d6" font-size="13">The exact same virtual address; only the PTE protection field changes.</text>

  <!-- Before -->
  <rect x="60" y="100" width="420" height="380" fill="#2c3a1e" stroke="#7fd28c"/>
  <text x="270" y="128" text-anchor="middle" fill="#bce3a8" font-size="15" font-weight="700">!vprot 0x0d27e514  — BEFORE</text>

  <g font-family="Consolas,monospace" font-size="13" fill="#c9c9d6">
    <text x="80" y="170">BaseAddress:    0x0d27e000</text>
    <text x="80" y="195">AllocationBase: 0x0d270000</text>
    <text x="80" y="220">AllocationProt: PAGE_READWRITE</text>
    <text x="80" y="245">RegionSize:     0x00002000</text>
    <text x="80" y="270">State:          MEM_COMMIT</text>
    <text x="80" y="295">Protect:        <tspan fill="#f7d774">PAGE_READWRITE (0x04)</tspan></text>
    <text x="80" y="320">Type:           MEM_PRIVATE</text>
  </g>

  <text x="80" y="380" fill="#e94560" font-size="14" font-weight="700">NX bit = 1 → shellcode blocked</text>
  <text x="80" y="405" fill="#c9c9d6" font-size="12">Executing this page raises</text>
  <text x="80" y="425" fill="#c9c9d6" font-size="12">STATUS_ACCESS_VIOLATION.</text>

  <!-- After -->
  <rect x="520" y="100" width="420" height="380" fill="#3b1d2a" stroke="#e94560"/>
  <text x="730" y="128" text-anchor="middle" fill="#ff8fa0" font-size="15" font-weight="700">!vprot 0x0d27e514  — AFTER</text>

  <g font-family="Consolas,monospace" font-size="13" fill="#c9c9d6">
    <text x="540" y="170">BaseAddress:    0x0d27e000</text>
    <text x="540" y="195">AllocationBase: 0x0d270000</text>
    <text x="540" y="220">AllocationProt: PAGE_READWRITE</text>
    <text x="540" y="245">RegionSize:     0x00001000</text>
    <text x="540" y="270">State:          MEM_COMMIT</text>
    <text x="540" y="295">Protect:        <tspan fill="#7fd28c">PAGE_EXECUTE_READWRITE (0x40)</tspan></text>
    <text x="540" y="320">Type:           MEM_PRIVATE</text>
  </g>

  <text x="540" y="380" fill="#7fd28c" font-size="14" font-weight="700">NX bit = 0 → shellcode allowed</text>
  <text x="540" y="405" fill="#c9c9d6" font-size="12">VirtualAlloc(MEM_COMMIT, RWX)</text>
  <text x="540" y="425" fill="#c9c9d6" font-size="12">flipped the PTE. DEP is defeated.</text>
</svg>
