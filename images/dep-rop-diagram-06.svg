<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 560" font-family="'Segoe UI',sans-serif">
  <defs><linearGradient id="bg6" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#1a1a2e"/><stop offset="1" stop-color="#0f0f1e"/></linearGradient></defs>
  <rect width="1000" height="560" fill="url(#bg6)"/>
  <text x="500" y="42" text-anchor="middle" fill="#e94560" font-size="22" font-weight="700">Stack pivot — before and after the pivot gadget</text>
  <text x="500" y="66" text-anchor="middle" fill="#c9c9d6" font-size="13">xchg eax,ebp / mov esp,ebp; pop ebp; ret — ESP jumps to the top of the skeleton</text>

  <!-- Before -->
  <rect x="60" y="90" width="420" height="440" fill="#16213e" stroke="#3f3f6b"/>
  <text x="270" y="118" text-anchor="middle" fill="#f7d774" font-size="15" font-weight="700">BEFORE pivot</text>

  <g font-family="Consolas,monospace" font-size="12">
    <rect x="80" y="140" width="380" height="30" fill="#ff9a4233" stroke="#ff9a42"/><text x="90" y="160" fill="#ffc088">skeleton[0] VirtualAlloc</text>
    <rect x="80" y="172" width="380" height="30" fill="#ff9a4233" stroke="#ff9a42"/><text x="90" y="192" fill="#ffc088">skeleton[1] RET → shellcode</text>
    <rect x="80" y="204" width="380" height="30" fill="#ff9a4233" stroke="#ff9a42"/><text x="90" y="224" fill="#ffc088">skeleton[2] lpAddress</text>
    <rect x="80" y="236" width="380" height="30" fill="#ff9a4233" stroke="#ff9a42"/><text x="90" y="256" fill="#ffc088">skeleton[3] dwSize = 1</text>
    <rect x="80" y="268" width="380" height="30" fill="#ff9a4233" stroke="#ff9a42"/><text x="90" y="288" fill="#ffc088">skeleton[4] AllocationType 0x1000</text>
    <rect x="80" y="300" width="380" height="30" fill="#ff9a4233" stroke="#ff9a42"/><text x="90" y="320" fill="#ffc088">skeleton[5] flProtect 0x40</text>

    <rect x="80" y="340" width="380" height="30" fill="#5aa9ff33" stroke="#5aa9ff"/><text x="90" y="360" fill="#a5c9ff">... more ROP gadgets ...</text>
    <rect x="80" y="372" width="380" height="30" fill="#5aa9ff55" stroke="#5aa9ff"/><text x="90" y="392" fill="#ffffff">ESP → pivot gadget</text>
  </g>

  <text x="80" y="430" fill="#c9c9d6" font-size="12" font-family="Consolas,monospace">EAX = ESI − 0x18  (top of skeleton)</text>
  <text x="80" y="450" fill="#c9c9d6" font-size="12" font-family="Consolas,monospace">EBP =    (junk)</text>

  <!-- After -->
  <rect x="520" y="90" width="420" height="440" fill="#16213e" stroke="#3f3f6b"/>
  <text x="730" y="118" text-anchor="middle" fill="#7fd28c" font-size="15" font-weight="700">AFTER pivot</text>

  <g font-family="Consolas,monospace" font-size="12">
    <rect x="540" y="140" width="380" height="30" fill="#ff9a4255" stroke="#ff9a42"/><text x="550" y="160" fill="#ffffff">ESP → skeleton[0] VirtualAlloc</text>
    <rect x="540" y="172" width="380" height="30" fill="#ff9a4233" stroke="#ff9a42"/><text x="550" y="192" fill="#ffc088">skeleton[1] RET → shellcode</text>
    <rect x="540" y="204" width="380" height="30" fill="#ff9a4233" stroke="#ff9a42"/><text x="550" y="224" fill="#ffc088">skeleton[2] lpAddress</text>
    <rect x="540" y="236" width="380" height="30" fill="#ff9a4233" stroke="#ff9a42"/><text x="550" y="256" fill="#ffc088">skeleton[3] dwSize = 1</text>
    <rect x="540" y="268" width="380" height="30" fill="#ff9a4233" stroke="#ff9a42"/><text x="550" y="288" fill="#ffc088">skeleton[4] AllocationType 0x1000</text>
    <rect x="540" y="300" width="380" height="30" fill="#ff9a4233" stroke="#ff9a42"/><text x="550" y="320" fill="#ffc088">skeleton[5] flProtect 0x40</text>
  </g>

  <text x="540" y="380" fill="#7fd28c" font-size="13" font-weight="700">Next RET pops skeleton[0]</text>
  <text x="540" y="400" fill="#c9c9d6" font-size="12">→ EIP = VirtualAlloc.</text>
  <text x="540" y="420" fill="#c9c9d6" font-size="12">Windows sees a normal STDCALL:</text>
  <text x="540" y="440" fill="#c9c9d6" font-size="12" font-family="Consolas,monospace">RET addr, arg1, arg2, arg3, arg4</text>
  <text x="540" y="465" fill="#c9c9d6" font-size="12">On return, EIP = shellcode. The</text>
  <text x="540" y="485" fill="#c9c9d6" font-size="12">page it lands on is now RWX.</text>
</svg>
