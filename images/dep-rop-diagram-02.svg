<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 620" font-family="'Segoe UI',sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#1a1a2e"/><stop offset="1" stop-color="#0f0f1e"/></linearGradient>
    <marker id="arrb" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#5aa9ff"/>
    </marker>
  </defs>
  <rect width="1000" height="620" fill="url(#bg2)"/>
  <text x="500" y="40" text-anchor="middle" fill="#e94560" font-size="22" font-weight="700">ROP — The Paradigm Shift From Writing to Borrowing Instructions</text>
  <text x="500" y="66" text-anchor="middle" fill="#c9c9d6" font-size="13">Every gadget already lives in an executable page. ESP walks a chain of return addresses.</text>

  <!-- Stack (attacker-controlled data) -->
  <rect x="40" y="100" width="360" height="480" rx="8" fill="#3b1d2a" stroke="#e94560"/>
  <text x="220" y="128" text-anchor="middle" fill="#ff8fa0" font-size="15" font-weight="700">Stack (attacker-controlled)</text>
  <text x="220" y="146" text-anchor="middle" fill="#ffc7d0" font-size="11">Return addresses cascade as chained gadgets</text>

  <g font-family="Consolas,monospace" font-size="12">
    <rect x="70" y="170" width="300" height="34" fill="#5aa9ff22" stroke="#5aa9ff"/>
    <text x="80" y="192" fill="#a5c9ff">0x5050118e</text><text x="185" y="192" fill="#ffffff">→ mov eax,esi ; pop esi ; ret</text>

    <rect x="70" y="210" width="300" height="34" fill="#f7d77422" stroke="#f7d774"/>
    <text x="80" y="232" fill="#f7d774">0x42424242</text><text x="185" y="232" fill="#ffffff">   (junk popped into ESI)</text>

    <rect x="70" y="250" width="300" height="34" fill="#5aa9ff22" stroke="#5aa9ff"/>
    <text x="80" y="272" fill="#a5c9ff">0x505115a3</text><text x="185" y="272" fill="#ffffff">→ pop ecx ; ret</text>

    <rect x="70" y="290" width="300" height="34" fill="#f7d77422" stroke="#f7d774"/>
    <text x="80" y="312" fill="#f7d774">0xFFFFFFE4</text><text x="185" y="312" fill="#ffffff">   (-0x1C into ECX)</text>

    <rect x="70" y="330" width="300" height="34" fill="#5aa9ff22" stroke="#5aa9ff"/>
    <text x="80" y="352" fill="#a5c9ff">0x5051579a</text><text x="185" y="352" fill="#ffffff">→ add eax,ecx ; ret</text>

    <rect x="70" y="370" width="300" height="34" fill="#5aa9ff22" stroke="#5aa9ff"/>
    <text x="80" y="392" fill="#a5c9ff">0x50537d5b</text><text x="185" y="392" fill="#ffffff">→ push eax ; pop esi ; ret</text>

    <rect x="70" y="410" width="300" height="34" fill="#5aa9ff22" stroke="#5aa9ff"/>
    <text x="80" y="432" fill="#a5c9ff">0x5053a0f5</text><text x="185" y="432" fill="#ffffff">→ pop eax ; ret</text>

    <rect x="70" y="450" width="300" height="34" fill="#ff9a4222" stroke="#ff9a42"/>
    <text x="80" y="472" fill="#ffc088">0x5054A221</text><text x="185" y="472" fill="#ffffff">   VirtualAlloc IAT+1</text>

    <rect x="70" y="490" width="300" height="34" fill="#5aa9ff22" stroke="#5aa9ff"/>
    <text x="80" y="512" fill="#a5c9ff">... more gadgets ...</text>
    <rect x="70" y="530" width="300" height="34" fill="#7fd28c22" stroke="#7fd28c"/>
    <text x="80" y="552" fill="#bce3a8">VirtualAlloc() executes</text>
  </g>

  <!-- Arrow flow -->
  <text x="435" y="360" fill="#5aa9ff" font-size="30">→</text>

  <!-- Execution model -->
  <rect x="470" y="100" width="490" height="480" rx="8" fill="#16213e" stroke="#3f3f6b"/>
  <text x="715" y="128" text-anchor="middle" fill="#a5c9ff" font-size="15" font-weight="700">Execution model — ret is the new call</text>

  <g font-family="Consolas,monospace" font-size="12" fill="#c9c9d6">
    <text x="490" y="170">// classical program:</text>
    <text x="490" y="190" fill="#7fd28c">   call func_a</text>
    <text x="490" y="210" fill="#7fd28c">   call func_b</text>
    <text x="490" y="230" fill="#7fd28c">   call func_c</text>

    <text x="490" y="270">// ROP program:</text>
    <text x="490" y="290" fill="#ff8fa0">   ret  → gadget_a → ret</text>
    <text x="490" y="310" fill="#ff8fa0">   ret  → gadget_b → ret</text>
    <text x="490" y="330" fill="#ff8fa0">   ret  → gadget_c → ret</text>
  </g>

  <text x="490" y="380" fill="#ffffff" font-size="14" font-weight="700">Why this works under DEP</text>
  <text x="490" y="405" fill="#c9c9d6" font-size="12">1. Every gadget is inside an already-executable module page.</text>
  <text x="490" y="425" fill="#c9c9d6" font-size="12">2. RET pops the next return address from ESP.</text>
  <text x="490" y="445" fill="#c9c9d6" font-size="12">3. That address is another gadget in the same module.</text>
  <text x="490" y="465" fill="#c9c9d6" font-size="12">4. ESP walks down the chain we planted on the stack.</text>

  <text x="490" y="510" fill="#f7d774" font-size="13" font-weight="700">DEP never sees us "executing the stack".</text>
  <text x="490" y="530" fill="#c9c9d6" font-size="12">The stack is only <tspan fill="#7fd28c">data</tspan> — pointers to code. The code lives elsewhere.</text>
  <text x="490" y="550" fill="#c9c9d6" font-size="12">By the time DEP would notice, VirtualAlloc/VirtualProtect has flipped NX off.</text>
</svg>
