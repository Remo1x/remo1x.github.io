<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 580" font-family="'Segoe UI',sans-serif">
  <defs><linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#1a1a2e"/><stop offset="1" stop-color="#0f0f1e"/></linearGradient></defs>
  <rect width="1000" height="580" fill="url(#bg3)"/>
  <text x="500" y="42" text-anchor="middle" fill="#e94560" font-size="22" font-weight="700">VirtualAlloc — the API skeleton we plant on the stack</text>
  <text x="500" y="68" text-anchor="middle" fill="#c9c9d6" font-size="13">Six 4-byte slots. ROP fills each one, then RET into the API.</text>

  <!-- Skeleton -->
  <g font-family="Consolas,monospace" font-size="13">
    <rect x="120" y="110" width="440" height="40" fill="#5aa9ff33" stroke="#5aa9ff"/>
    <text x="140" y="135" fill="#ffffff">[+0x00]  VirtualAlloc() address</text>
    <text x="580" y="135" fill="#a5c9ff" font-size="12">← EIP jumps here</text>

    <rect x="120" y="155" width="440" height="40" fill="#ff9a4233" stroke="#ff9a42"/>
    <text x="140" y="180" fill="#ffffff">[+0x04]  Return address = shellcode</text>
    <text x="580" y="180" fill="#ffc088" font-size="12">where VirtualAlloc RETs to</text>

    <rect x="120" y="200" width="440" height="40" fill="#ff9a4233" stroke="#ff9a42"/>
    <text x="140" y="225" fill="#ffffff">[+0x08]  lpAddress   → shellcode address</text>
    <text x="580" y="225" fill="#ffc088" font-size="12">page to make executable</text>

    <rect x="120" y="245" width="440" height="40" fill="#ff9a4233" stroke="#ff9a42"/>
    <text x="140" y="270" fill="#ffffff">[+0x0C]  dwSize      = 0x00000001</text>
    <text x="580" y="270" fill="#ffc088" font-size="12">rounds up to full page</text>

    <rect x="120" y="290" width="440" height="40" fill="#ff9a4233" stroke="#ff9a42"/>
    <text x="140" y="315" fill="#ffffff">[+0x10]  flAllocationType = 0x00001000</text>
    <text x="580" y="315" fill="#ffc088" font-size="12">MEM_COMMIT</text>

    <rect x="120" y="335" width="440" height="40" fill="#ff9a4233" stroke="#ff9a42"/>
    <text x="140" y="360" fill="#ffffff">[+0x14]  flProtect        = 0x00000040</text>
    <text x="580" y="360" fill="#ffc088" font-size="12">PAGE_EXECUTE_READWRITE</text>
  </g>

  <!-- Bad-char problem callouts -->
  <text x="120" y="420" fill="#f7d774" font-size="15" font-weight="700">Every constant contains a null / bad byte:</text>
  <g font-family="Consolas,monospace" font-size="12" fill="#e94560">
    <text x="140" y="445">• 0x00000001  → three null bytes    (neg trick: neg(-1) = 1)</text>
    <text x="140" y="465">• 0x00001000  → two null bytes      (split: 0x80808080 + 0x7f7f8f80 = 0x1000)</text>
    <text x="140" y="485">• 0x00000040  → three null bytes    (neg trick: neg(0xffffffc0) = 0x40)</text>
    <text x="140" y="505">• VirtualAlloc IAT ends in 0x20     (bad char: fetch IAT+1, then sub 1)</text>
  </g>

  <text x="500" y="550" text-anchor="middle" fill="#7fd28c" font-size="13" font-weight="700">Every one of these constraints is what the ROP chain silently solves.</text>
</svg>
